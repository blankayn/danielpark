<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Park</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #e83e5a;
            overflow: hidden;
            cursor: pointer;
        }

        .bg-gradient {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 30% 50%, #ff6b7a 0%, #e83e5a 50%, #c92a4a 100%);
            animation: bgShift 8s ease-in-out infinite;
        }

        @keyframes bgShift {
            0%, 100% { filter: hue-rotate(0deg) brightness(1); }
            50% { filter: hue-rotate(5deg) brightness(1.05); }
        }

        .character-wrapper {
            position: absolute;
            top: 5%;
            right: -2%;
            transform: none;
            height: 90vh;
            width: auto;
            max-width: 65%;
            animation: breathe 6s ease-in-out infinite;
            z-index: 2;
        }

        /* Mobile character positioning */
        @media (max-width: 768px) {
            .character-wrapper {
                top: 40%;
                right: 1%;
                transform: none;
                height: 55vh;
                max-width: 70%;
            }
        }

        @media (max-width: 480px) {
            .character-wrapper {
                top: 45%;
                right: 15%;
                height: 45vh;
                max-width: 65%;
            }
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1) translateY(0); }
            40% { transform: scale(1.008) translateY(-3px); }
            60% { transform: scale(1.008) translateY(-3px); }
        }

        .character {
            height: 100%;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            object-position: center bottom;
            filter: drop-shadow(0 10px 40px rgba(0,0,0,0.3));
            pointer-events: none;
            display: block;
        }

        .breath-container {
            position: absolute;
            right: 1%;
            top: 36%;
            width: 300px;
            height: 200px;
            pointer-events: none;
            z-index: 3;
        }

        /* Mobile breath positioning */
        @media (max-width: 768px) {
            .breath-container {
                right: 35%;
                top: 58%;
                width: 200px;
            }
        }

        .particle {
            position: absolute;
            left: 0;
            top: 50%;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.35) 40%, transparent 70%);
            border-radius: 50%;
            filter: blur(8px);
            opacity: 0;
            animation: particleFloat 3s ease-out infinite;
        }

        .particle:nth-child(1) { animation-delay: 0s; }
        .particle:nth-child(2) { animation-delay: 0.6s; }
        .particle:nth-child(3) { animation-delay: 1.2s; }
        .particle:nth-child(4) { animation-delay: 1.8s; }
        .particle:nth-child(5) { animation-delay: 2.4s; }

        @keyframes particleFloat {
            0% { transform: translate(0, -50%) scale(0.3); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translate(-200px, -50%) scale(2.5); opacity: 0; }
        }

        .wisp-container {
            position: absolute;
            right: 40%;
            top: 40%;
            width: 300px;
            height: 100px;
            pointer-events: none;
            z-index: 3;
        }

        /* Mobile wisp positioning */
        @media (max-width: 768px) {
            .wisp-container {
                right: 37%;
                top: 56%;
                width: 200px;
            }
        }

        .wisp {
            position: absolute;
            left: 0;
            top: 50%;
            width: 100px;
            height: 25px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            filter: blur(12px);
            border-radius: 50%;
            opacity: 0;
            animation: wispFlow 2.5s ease-out infinite;
        }

        .wisp:nth-child(1) { animation-delay: 0s; top: 45%; }
        .wisp:nth-child(2) { animation-delay: 0.8s; top: 55%; }
        .wisp:nth-child(3) { animation-delay: 1.6s; top: 50%; }

        @keyframes wispFlow {
            0% { transform: translateX(0) scaleX(0.5); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateX(-220px) scaleX(2); opacity: 0; }
        }

        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
            z-index: 5;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(232, 62, 90, 0.2);
            border-top-color: #e83e5a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .title-text {
            position: absolute;
            left: 5%;
            top: 50%;
            transform: translateY(-50%);
            font-size: 4rem;
            font-weight: 900;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            letter-spacing: 0.1em;
            z-index: 4;
            overflow: hidden;
        }

        .title-text .char {
            display: inline-block;
            opacity: 0;
            transform: translateY(100px) rotateX(-90deg);
        }

        .social-links {
            position: absolute;
            left: 5%;
            top: calc(50% + 96px);
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        .social-link {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 24px;
            transition: all 0.3s ease;
            opacity: 1;
            transform: translateY(0);
            box-shadow: 0 8px 24px rgba(0,0,0,0.18);
        }

        .social-link svg {
            display: block;
            width: 22px;
            height: 22px;
            flex: 0 0 auto;
            overflow: visible;
        }

        .social-link:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.4);
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .social-link.facebook:hover { background: rgba(24, 119, 242, 0.3); }
        .social-link.instagram:hover { background: rgba(225, 48, 108, 0.3); }
        .social-link.github:hover { background: rgba(255, 255, 255, 0.2); }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .title-text {
                left: 16px;
                right: 16px;
                top: 12%;
                transform: none;
                width: auto;
                font-size: 1.9rem;
                text-align: center;
                letter-spacing: 0.08em;
                white-space: nowrap;
                overflow: visible;
            }
            
            .social-links {
                left: 0;
                right: 0;
                top: calc(12% + 72px);
                transform: none;
                justify-content: center;
                gap: 18px;
            }
            
            .social-link {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }
        }

        @media (max-width: 480px) {
            .title-text {
                left: 12px;
                right: 12px;
                font-size: 1.4rem;
            }

            .social-links {
                top: calc(12% + 62px);
                gap: 14px;
            }

            .social-link {
                width: 42px;
                height: 42px;
            }

            .social-link svg {
                width: 20px;
                height: 20px;
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loader">
        <div class="loader"></div>
    </div>

    <div class="container" id="container">
        <div class="bg-gradient"></div>
        <div class="vignette"></div>

        <div class="breath-container">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>

        <div class="wisp-container">
            <div class="wisp"></div>
            <div class="wisp"></div>
            <div class="wisp"></div>
        </div>

        <div class="character-wrapper" id="charWrapper">
            <img src="daniel park.png" 
                 alt="Daniel Park" 
                 class="character"
                 id="characterImg">
        </div>

        <div class="title-text" id="titleText">
            <span class="char">D</span>
            <span class="char">A</span>
            <span class="char">N</span>
            <span class="char">I</span>
            <span class="char">E</span>
            <span class="char">L</span>
            <span class="char">&nbsp;</span>
            <span class="char">P</span>
            <span class="char">A</span>
            <span class="char">R</span>
            <span class="char">K</span>
        </div>

        <div class="social-links" id="socialLinks">
            <!-- Facebook -->
            <a href="https://facebook.com/kirtdenielnmagno" target="_blank" class="social-link facebook" title="Facebook">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="white">
                    <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
                </svg>
            </a>
            <!-- Instagram -->
            <a href="https://instagram.com/chesknot8" target="_blank" class="social-link instagram" title="Instagram">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                    <circle cx="12" cy="12" r="4"/>
                    <circle cx="17.5" cy="6.5" r="1" fill="white" stroke="none"/>
                </svg>
            </a>
            <!-- GitHub -->
            <a href="https://github.com/blankayn" target="_blank" class="social-link github" title="GitHub">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="white">
                    <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
                </svg>
            </a>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');

                const chars = document.querySelectorAll('.title-text .char');
                const socialLinks = document.querySelectorAll('.social-link');
                const isMobile = window.innerWidth <= 768;
                const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                const titleStartY = isMobile ? 36 : 100;
                const titleStartRotation = isMobile ? -45 : -90;
                const titleDuration = isMobile ? 0.5 : 0.8;
                const titleStagger = isMobile ? 0.04 : 0.1;
                const titleDelay = isMobile ? 0.25 : 0.5;
                const socialStartOpacity = isMobile ? 1 : 0;
                const socialStartY = isMobile ? 12 : 30;
                const socialDuration = isMobile ? 0.35 : 0.6;
                const socialDelay = isMobile ? 0.45 : 1.2;

                if (!reduceMotion && window.gsap) {
                    // Animate title chars in
                    gsap.fromTo(chars,
                        { opacity: 0, y: titleStartY, rotationX: titleStartRotation },
                        {
                            opacity: 1,
                            y: 0,
                            rotationX: 0,
                            duration: titleDuration,
                            ease: "back.out(1.7)",
                            stagger: titleStagger,
                            delay: titleDelay
                        }
                    );

                    // Animate social icons in
                    gsap.fromTo(socialLinks,
                        { opacity: socialStartOpacity, y: socialStartY },
                        {
                            opacity: 1,
                            y: 0,
                            duration: socialDuration,
                            ease: "power2.out",
                            stagger: 0.1,
                            delay: socialDelay
                        }
                    );

                    // Floating animation on title
                    gsap.to('.title-text', {
                        y: isMobile ? -5 : -10,
                        duration: 3,
                        ease: "power1.inOut",
                        yoyo: true,
                        repeat: -1
                    });
                } else {
                    chars.forEach(char => {
                        char.style.opacity = '1';
                        char.style.transform = 'translateY(0) rotateX(0)';
                    });
                    socialLinks.forEach(link => {
                        link.style.opacity = '1';
                        link.style.transform = 'translateY(0)';
                    });
                }
            }, 500);
        });

        const container = document.getElementById('container');
        const wrapper = document.getElementById('charWrapper');

        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width - 0.5;
            const y = (e.clientY - rect.top) / rect.height - 0.5;
            wrapper.style.transform = `translate(${x * 12}px, ${y * 6}px)`;
        });

        container.addEventListener('mouseleave', () => {
            wrapper.style.transform = 'none';
        });

        let intenseMode = false;
        container.addEventListener('click', () => {
            intenseMode = !intenseMode;
            const particles = document.querySelectorAll('.particle');
            const wisps = document.querySelectorAll('.wisp');

            particles.forEach(p => { p.style.animationDuration = intenseMode ? '1.5s' : '3s'; });
            wisps.forEach(w => { w.style.animationDuration = intenseMode ? '1.2s' : '2.5s'; });
            wrapper.style.animationDuration = intenseMode ? '2.5s' : '6s';
        });
    </script>
</body>
</html>
